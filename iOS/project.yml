name: Stoolcheck
options:
  bundleIdPrefix: com.shimondeitel.stoollog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Stoolcheck:
    type: application
    platform: iOS
    sources:
      - path: Stoolcheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stoollog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Stoolcheck/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StoolcheckTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StoolcheckTests
      - path: Stoolcheck.storekit
    dependencies:
      - target: Stoolcheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stoollog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StoolcheckUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StoolcheckUITests
    dependencies:
      - target: Stoolcheck
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.stoollog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Stoolcheck:
    build:
      targets:
        Stoolcheck: all
        StoolcheckTests: [test]
        StoolcheckUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Stoolcheck.storekit
    test:
      config: Debug
      storeKitConfiguration: Stoolcheck.storekit
      targets:
        - StoolcheckTests
        - StoolcheckUITests
    archive:
      config: Release
